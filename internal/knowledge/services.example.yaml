# services.yaml — Optional service configuration for BMD microservice detection.
#
# Place this file in the root of your documentation directory (alongside bmd.db)
# to configure explicit service definitions.  Configured services take priority
# over auto-detected services and receive confidence=1.0.
#
# Format:
#   services:
#     - id: <service-id>          # URL-safe identifier (kebab-case)
#       patterns: ["...", "..."]  # Case-insensitive patterns matched against
#                                 # filenames and H1 headings
#       type: <service-type>      # microservice | database | cache | queue | gateway

services:
  - id: api-gateway
    patterns: ["api-gateway", "API Gateway"]
    type: gateway

  - id: auth-service
    patterns: ["auth-service", "Auth Service", "Authentication Service"]
    type: microservice

  - id: user-service
    patterns: ["user-service", "User Service"]
    type: microservice

  - id: payment-service
    patterns: ["payment-service", "Payment Service"]
    type: microservice

  - id: notification-service
    patterns: ["notification-service", "Notification Service"]
    type: microservice

  - id: postgres
    patterns: ["postgres", "PostgreSQL", "database"]
    type: database

  - id: redis-cache
    patterns: ["redis", "Redis Cache"]
    type: cache
